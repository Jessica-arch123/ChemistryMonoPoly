<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ChemistryPoly Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6c5ce7; --accent: #00d2d3; --bg: #0f172a; --card: rgba(255, 255, 255, 0.1); --gold: #feca57; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        .screen { display: none; max-width: 900px; margin: auto; }
        .active { display: block; }
        .char-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .char-card { background: var(--card); padding: 30px; border-radius: 20px; cursor: pointer; border: 4px solid transparent; text-align: center; }
        .glowing { border-color: var(--accent); box-shadow: 0 0 20px var(--accent); }
        .board { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; height: 500px; margin: 20px 0; }
        .tile { border: 1px solid #334155; font-size: 0.6rem; display: flex; align-items: center; justify-content: center; background: #1e293b; border-radius: 5px; }
        .dashboard { display: flex; justify-content: space-around; background: #334155; padding: 15px; border-radius: 15px; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; }
        .card { background:#1e293b; padding:30px; border-radius:20px; width:90%; max-width:500px; border:2px solid var(--primary); }
    </style>
</head>
<body>

<div id="screen1" class="screen active">
    <h1>ChemistryPoly Instructions</h1>
    <p>1. Select your characters (glows when active).<br>2. Reach the highest points by answering questions correctly.<br>3. Land on tiles, roll dice, and outsmart your opponents!</p>
    <div class="char-grid">
        <div id="card0" class="char-card" onclick="select(0)">🐱<br>CAT</div>
        <div id="card1" class="char-card" onclick="select(1)">🐶<br>DOG</div>
        <div id="card2" class="char-card" onclick="select(2)">🦊<br>FOX</div>
        <div id="card3" class="char-card" onclick="select(3)">🐰<br>BUN</div>
    </div>
    <button id="startBtn" disabled onclick="startGame()" style="width:100%; padding:20px; margin-top:20px;">START GAME</button>
</div>

<div id="screen2" class="screen">
    <div class="dashboard" id="dash"></div>
    <div class="board" id="board"></div>
    <h2 id="turnLabel" style="text-align:center;"></h2>
    <button onclick="rollDice()" style="width:100%; padding:20px; background:var(--gold); border:none; font-weight:900;">ROLL DICE</button>
</div>

<div class="modal" id="qOverlay"><div class="card"><h3 id="qMod"></h3><p id="qText"></p><div id="qOptions"></div></div></div>

<script>
    const questions = [
        // Analytical
        { mod:"ANALYTICAL", text:"Closeness of a measured value to the true value is:", options:["Precision","Accuracy","Linearity","Selectivity"], correct:"Accuracy" },
        { mod:"ANALYTICAL", text:"Reproducibility of measurements is:", options:["Accuracy","Precision","Sensitivity","Speed"], correct:"Precision" },
        { mod:"ANALYTICAL", text:"A primary standard must be:", options:["Hygroscopic","Pure and stable","Liquid","Volatile"], correct:"Pure and stable" },
        { mod:"ANALYTICAL", text:"Accuracy is expressed as:", options:["Std Dev","Percent Error","Variance","Range"], correct:"Percent Error" },
        { mod:"ANALYTICAL", text:"Precision is expressed as:", options:["Percent Error","RSD","Mean","Sensitivity"], correct:"RSD" },
        { mod:"ANALYTICAL", text:"Scatter symmetrically around the mean:", options:["Systematic","Random","Constant","Blunder"], correct:"Random" },
        { mod:"ANALYTICAL", text:"Result in bias:", options:["Random","Systematic","Gross","Indeterminate"], correct:"Systematic" },
        { mod:"ANALYTICAL", text:"Smallest concentration detectable:", options:["Accuracy","LOD","Precision","Sensitivity"], correct:"LOD" },
        // Titrations
        { mod:"TITRATIONS", text:"Mohr Method indicator for Cl-?", options:["Ferric","K2CrO4","Fluorescein","Methyl Red"], correct:"K2CrO4" },
        { mod:"TITRATIONS", text:"Volhard Method uses:", options:["Direct","Back","Complexo","Redox"], correct:"Back" },
        { mod:"TITRATIONS", text:"Indicator for EDTA at pH 10?", options:["Murexide","Erio-T","Starch","Litmus"], correct:"Erio-T" },
        { mod:"TITRATIONS", text:"EDTA is a ___ ligand:", options:["Bidentate","Tetradentate","Hexadentate","Monodentate"], correct:"Hexadentate" },
        { mod:"TITRATIONS", text:"Starch is indicator for:", options:["KMnO4","I2","EDTA","AgNO3"], correct:"I2" },
        { mod:"TITRATIONS", text:"KMnO4 is:", options:["Self-indicating","Requires Starch","Requires Erio-T","Phenolphthalein"], correct:"Self-indicating" },
        { mod:"TITRATIONS", text:"Standardizing EDTA requires:", options:["NaOH","CaCO3","HCl","KMnO4"], correct:"CaCO3" },
        { mod:"TITRATIONS", text:"Titrant in Volhard:", options:["AgNO3","KSCN","NaOH","EDTA"], correct:"KSCN" },
        // Concentrations
        { mod:"CONC.", text:"Molarity (M) is:", options:["Moles/L","Moles/kg","Grams/L","Weight %"], correct:"Moles/L" },
        { mod:"CONC.", text:"Molality (m) is:", options:["Moles/L","Moles/kg","Mole fraction","Grams/mL"], correct:"Moles/kg" },
        { mod:"CONC.", text:"Mole fraction formula:", options:["nA / Total","nA / kg","Wt/Vol","Density"], correct:"nA / Total" },
        { mod:"CONC.", text:"1 ppm is mg of solute per:", options:["Liter","Kilogram","Milliliter","Gram"], correct:"Liter" },
        { mod:"CONC.", text:"Weight/Volume affected by:", options:["Concentration","Temperature","Gravity","Pressure"], correct:"Temperature" },
        { mod:"CONC.", text:"Grams of NaOH (MW:40) for 500mL of 0.1M:", options:["1g","2g","4g","0.5g"], correct:"2g" },
        { mod:"CONC.", text:"Dilution formula:", options:["PV=nRT","C1V1=C2V2","pH=-log","n=m/MW"], correct:"C1V1=C2V2" },
        { mod:"CONC.", text:"Density:", options:["Mass/Vol","Vol/Mass","Moles/L","Grams/Eq"], correct:"Mass/Vol" },
        // Acid-Base
        { mod:"ACID-BASE", text:"Henderson-Hasselbalch:", options:["pH=pKa+log([A-]/[HA])","pH=pKa-log([A-]/[HA])","pH=-log[H+]","pKa=-log Ka"], correct:"pH=pKa+log([A-]/[HA])" },
        { mod:"ACID-BASE", text:"Buffering max at:", options:["pH=7","pH=pKa","pOH=pKb","pH=1"], correct:"pH=pKa" },
        { mod:"ACID-BASE", text:"Bronsted Base:", options:["Proton donor","Proton acceptor","Electron donor","Lewis acid"], correct:"Proton acceptor" },
        { mod:"ACID-BASE", text:"Bronsted Acid:", options:["Proton donor","Proton acceptor","Electron donor","Acceptor"], correct:"Proton donor" },
        { mod:"ACID-BASE", text:"pH + pOH at 25°C:", options:["7","14","1","10"], correct:"14" },
        { mod:"ACID-BASE", text:"Strong acid:", options:["CH3COOH","HCl","NH3","H2CO3"], correct:"HCl" },
        { mod:"ACID-BASE", text:"Buffer is:", options:["Strong base","Conjugate base","Solvent","Indicator"], correct:"Conjugate base" },
        { mod:"ACID-BASE", text:"Ka measures:", options:["Strong bases","Weak acids","Solubility","Ionic bonds"], correct:"Weak acids" },
        // VSEPR
        { mod:"VSEPR", text:"NH3 shape:", options:["Trigonal Planar","Trigonal Pyramidal","Tetrahedral","Bent"], correct:"Trigonal Pyramidal" },
        { mod:"VSEPR", text:"PCl5 shape:", options:["Octahedral","Trigonal Bipyramidal","Tetrahedral","Linear"], correct:"Trigonal Bipyramidal" },
        { mod:"VSEPR", text:"H2O shape:", options:["Linear","Bent","Tetrahedral","Trigonal Planar"], correct:"Bent" },
        { mod:"VSEPR", text:"CH4 geometry:", options:["Square Planar","Tetrahedral","Octahedral","Pyramidal"], correct:"Tetrahedral" },
        { mod:"VSEPR", text:"CO2 angle:", options:["90","109.5","120","180"], correct:"180" },
        { mod:"VSEPR", text:"SF6 shape:", options:["Octahedral","Hexagonal","Square Planar","Trigonal Bipyramidal"], correct:"Octahedral" },
        { mod:"VSEPR", text:"CH4 angle:", options:["180","120","109.5","90"], correct:"109.5" },
        { mod:"VSEPR", text:"BF3 shape:", options:["Trigonal Planar","Trigonal Pyramidal","Bent","Linear"], correct:"Trigonal Planar" },
        // Bonding
        { mod:"BONDING", text:"Hybridization of C in Methane?", options:["sp","sp2","sp3","dsp2"], correct:"sp3" },
        { mod:"BONDING", text:"Hybridization of C in Ethene?", options:["sp","sp2","sp3","sp3d"], correct:"sp2" },
        { mod:"BONDING", text:"Bond order for O2+?", options:["1.5","2.0","2.5","3.0"], correct:"2.5" },
        { mod:"BONDING", text:"Oxygen paramagnetism by:", options:["VSEPR","Valence Bond","MO Theory","Lewis"], correct:"MO Theory" },
        { mod:"BONDING", text:"Bond order for N2:", options:["1.0","2.0","3.0","2.5"], correct:"3.0" },
        { mod:"BONDING", text:"Hybridization of C in Ethyne?", options:["sp","sp2","sp3","dsp2"], correct:"sp" },
        { mod:"BONDING", text:"Sigma bond overlap:", options:["Side-to-side","End-to-end","Parallel","Perpendicular"], correct:"End-to-end" },
        { mod:"BONDING", text:"Pi bond overlap:", options:["End-to-end","Side-to-side","Axial","Direct"], correct:"Side-to-side" }
    ];

    let selected = [false,false,false,false], players = [], turn = 0;

    function select(i) {
        selected[i] = !selected[i];
        document.getElementById('card'+i).classList.toggle('glowing');
        document.getElementById('startBtn').disabled = !selected.includes(true);
    }

    function startGame() {
        players = selected.map((s,i) => s ? {id:i, pts:100, pos:0, name:['CAT','DOG','FOX','BUN'][i]} : null).filter(p => p);
        document.getElementById('screen1').style.display = 'none';
        document.getElementById('screen2').style.display = 'block';
        for(let i=0; i<36; i++) document.getElementById('board').innerHTML += `<div class="tile">${i}</div>`;
        updateDash();
    }

    function updateDash() {
        document.getElementById('dash').innerHTML = players.map(p => `<div>${p.name}: ${p.pts} pts</div>`).join('');
        document.getElementById('turnLabel').innerText = players[turn].name + "'s Turn";
    }

    function rollDice() {
        let r = Math.floor(Math.random()*6)+1;
        players[turn].pos = (players[turn].pos + r) % 36;
        let q = questions[Math.floor(Math.random()*questions.length)];
        document.getElementById('qOverlay').style.display = 'flex';
        document.getElementById('qMod').innerText = q.mod;
        document.getElementById('qText').innerText = q.text;
        document.getElementById('qOptions').innerHTML = q.options.map(o => `<button style="width:100%; margin:5px 0; padding:10px;" onclick="check('${o}', '${q.correct}')">${o}</button>`).join('');
    }

    function check(ans, cor) {
        if(ans === cor) players[turn].pts += 20; else players[turn].pts -= 10;
        document.getElementById('qOverlay').style.display = 'none';
        turn = (turn + 1) % players.length;
        updateDash();
    }
</script>
</body>
</html>
